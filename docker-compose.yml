version: "3.9"

services:
  redis:
    image: redis:7.2-alpine
    container_name: neuralgateway_redis
    restart: unless-stopped
    ports:
      - "6379:6379"                  # host:container
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data             # persist data across restarts
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neuralgateway_net

  postgres:
    image: postgres:16-alpine
    container_name: neuralgateway_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neuralgateway_net

  qdrant:
    image: qdrant/qdrant:v1.8.1
    container_name: neuralgateway_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"    # REST API
      - "6334:6334"    # gRPC (faster, used internally)
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - neuralgateway_net

volumes:
  redis_data:
  postgres_data:
  qdrant_data:

networks:
  neuralgateway_net:
    driver: bridge
